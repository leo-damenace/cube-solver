<!DOCTYPE html>
<html>
<head>
    <title>4x4 AI Solver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="https://cdn.cubing.net/v0/js/cubing/twisty"></script>
    <style>
        body { background: #0c0c0c; color: white; font-family: sans-serif; text-align: center; }
        #app { display: none; padding: 20px; }
        .camera { width: 100%; max-width: 400px; border: 2px solid #c8f135; border-radius: 15px; margin: 20px auto; overflow: hidden; }
        video { width: 100%; display: block; }
        twisty-player { width: 100%; height: 300px; margin: 20px 0; }
        .btn { background: #c8f135; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gate">
        <h1>CUBESOLVE 4x4</h1>
        <button class="btn" onclick="window.signIn()">Login with Google</button>
    </div>

    <div id="app">
        <h2 id="status">Photo 1: Corner View</h2>
        <div class="camera"><video id="vid" autoplay playsinline></video></div>
        <button class="btn" onclick="window.capture()">📸 CAPTURE</button>
        <twisty-player id="cube" puzzle="4x4x4" visualization="3D"></twisty-player>
    </div>

    <input type="hidden" id="sb-url" value="{{ sb_url }}">
    <input type="hidden" id="sb-key" value="{{ sb_key }}">

    <script type="module" src="/static/script.js"></script>
</body>
</html>

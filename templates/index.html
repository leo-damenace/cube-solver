<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4x4 AI Solver</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0c0c0c; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 30px; background: #c8f135; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        #main-app { display: none; padding: 20px; }
        video { width: 100%; max-width: 500px; border-radius: 20px; border: 2px solid #333; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="auth-gate">
        <h1>CUBESOLVE <span style="color:#c8f135">AI</span></h1>
        <button class="btn" onclick="signIn()">Continue with Google</button>
    </div>

    <div id="main-app">
        <h2 id="status">Position White Face</h2>
        <video id="webcam" autoplay playsinline></video>
        <br><br>
        <button id="capture-btn" class="btn">📸 Capture Face</button>
        <div id="solution"></div>
        <twisty-player id="twisty" puzzle="4x4x4" style="width: 100%; height: 400px;"></twisty-player>
    </div>

    <script type="module" src="https://cdn.cubing.net/v0/js/cubing/twisty"></script>
    <script src="/static/script.js" type="module"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeSolve AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0c0c0c; --card: #161616; --accent: #c8f135; --text: #efefef; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #auth-gate, #app-interface { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #2c2c2c; text-align: center; max-width: 400px; width: 90%; }
        .btn { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; }
        video { width: 100%; border-radius: 12px; border: 2px solid #333; margin-top: 15px; }
        #app-interface { display: none; }
        .status { margin-top: 10px; color: var(--accent); font-size: 14px; }
    </style>
</head>
<body>
    <div id="auth-gate">
        <h1>CUBESOLVE <span style="color:var(--accent)">AI</span></h1>
        <p>Sign in with Google to start scanning</p>
        <button class="btn" onclick="window.signIn()">Continue with Google</button>
    </div>

    <div id="app-interface">
        <h2 id="step-title">Scan Face 1 of 6</h2>
        <video id="video" autoplay playsinline></video>
        <div id="scan-status" class="status">Waiting for capture...</div>
        <button id="capture-btn" class="btn" onclick="window.captureFace()">📸 Capture Face</button>
    </div>

    <script type="module" src="/static/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeSolve AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #3b82f6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #auth-gate { text-align: center; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #222; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #app-interface { display: none; text-align: center; }
        #camera-container { margin: 20px auto; width: 90%; max-width: 400px; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; display: block; }
    </style>
</head>
<body>
    <div id="auth-gate">
        <h1>CUBESOLVE <span style="color:var(--accent)">AI</span></h1>
        <p>Sign in to start solving</p>
        <button class="btn" onclick="window.signIn()">Continue with Google</button>
    </div>

    <div id="app-interface">
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
        </div>
        <button class="btn" onclick="window.capture()">Scan Face</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
